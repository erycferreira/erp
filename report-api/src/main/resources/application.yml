server:
  port: 8080

spring:
  application:
    name: report-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/reports}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics: 
      export:
        enabled: false
  opentelemetry: 
    tracing: 
      export: 
        otlp:
          endpoint: ${JAEGER_TRACE_URL:http://jaeger:4318/v1/traces}