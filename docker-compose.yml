services:

  report-api:
    build: .
    container_name: report-api
    environment:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq

  report-processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    container_name: report-processor
    environment:
      - .env
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:18
    container_name: report-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: report-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:8.6.1
    container_name: report-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - report-api
  
  grafana: 
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.75.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - report-api 

volumes:
  postgres_data:
    driver: local